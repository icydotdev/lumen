<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Prism: a single white beam enters, splits into a design-system spectrum -->
  <!-- Incoming beam -->
  <line x1="2" y1="46" x2="40" y2="52" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- Prism triangle -->
  <path d="M44 30 L78 78 L30 78 Z" fill="#1a1d27" stroke="#8b5cf6" stroke-width="3" stroke-linejoin="round"/>
  <path d="M44 30 L78 78 L30 78 Z" fill="url(#g)" opacity="0.18"/>

  <!-- Refracted spectrum -->
  <line x1="78" y1="66" x2="116" y2="44" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="68" x2="116" y2="56" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="70" x2="116" y2="68" stroke="#eab308" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="72" x2="116" y2="80" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="74" x2="116" y2="92" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>

  <!-- Spark at the apex -->
  <circle cx="44" cy="30" r="4" fill="#8b5cf6"/>
  <circle cx="44" cy="30" r="8" fill="#8b5cf6" opacity="0.25"/>

  <defs>
    <linearGradient id="g" x1="30" y1="30" x2="78" y2="78" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
</svg>
